<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Event Calender</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

    <link rel="stylesheet" href="./css/style.css">

    <script src="./javascript/script.js" defer></script>

</head>

<body>
    <div class="calender-container">
        <header>
            <p class="current-date"></p>
            <div class="icons">
                <span id="prev" class="material-symbols-outlined">
                    arrow_back_ios
                </span>
                <span id="next" class="material-symbols-outlined">
                    arrow_forward_ios
                </span>
            </div>
        </header>
        <div class="calender">
            <ul class="weeks">
                <li>Sun</li>
                <li>Mon</li>
                <li>Tue</li>
                <li>Wed</li>
                <li>Thu</li>
                <li>Fri</li>
                <li>Sat</li>
            </ul>
            <ul class="days"></ul>
        </div>
    </div>

    <div class="pop-up-event" id="pop-up-event">
        <div class="pop-up-event-content">
            <h3 id="selectedDateText"></h3>
            <input type="text" id="eventInput" placeholder="Add event">
            <button onclick="addEvent()">Add Event</button>
            <div class="event-list" id="eventList"></div>
            <button onclick="closepopupevent()">Close</button>
        </div>
    </div>

</body>

</html>
